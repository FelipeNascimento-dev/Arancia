{% extends 'global/base.html' %}

{% block content %}

<div class="iframe-page-container">

    <div class="iframe-header">
        <div>
            <h2>{{ acompanhamento.nome }}</h2>

            {% if acompanhamento.descricao %}
                <p>{{ acompanhamento.descricao }}</p>
            {% else %}
                <p>Visualização do painel de acompanhamento.</p>
            {% endif %}
        </div>

        <a href="{{ acompanhamento.link }}" target="_blank" class="btn-open-new-tab">
            <i class="fa-solid fa-up-right-from-square"></i>
            Abrir em nova aba
        </a>
    </div>

    <div class="iframe-wrapper">
        <iframe
            src="https://kuma.wolf.local/dashboard"
            title="{{ acompanhamento.nome }}"
            frameborder="0"
            allowfullscreen
            loading="lazy">
        </iframe>
    </div>

</div>

{% endblock %}
