{% extends 'global/base.html' %}

{% block content %}

<style>
  .form-card-2col {
    height: auto;
    margin-top: 65px;
    margin-bottom: 50px;
  }

  .pre-rec-info {
    margin-top: 16px;
    padding: 10px 12px;
    border-radius: 10px;
    background: #f5f5f5;
    font-size: 13px;
    color: #555;
  }

  .pre-rec-info strong {
    color: #222;
  }
</style>

<div class="form-container">
  <div class="form-card-2col">
    <form method="POST" id="form-pre-recebimento">
      {% include 'global/partials/_form_2colV2.html' %}
    </form>

    {% if numero_romaneio %}
    <div class="pre-rec-info">
      Romaneio informado: <strong>{{ numero_romaneio }}</strong>
      · Seriais bipados: <strong>{{ serials|length }}</strong>
    </div>
    {% endif %}
  </div>
</div>

<script>
(function () {
  function focusCampoAtivo() {
    var romaneio = document.getElementById('id_numero_romaneio');
    var serial = document.getElementById('id_serial');
    var alvo = romaneio && !(romaneio.value || '').trim() ? romaneio : serial;

    if (!alvo || alvo.disabled || alvo.offsetParent === null) return;
    alvo.focus({ preventScroll: true });
    try { alvo.setSelectionRange(alvo.value.length, alvo.value.length); } catch (_) {}
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', focusCampoAtivo);
  } else {
    focusCampoAtivo();
  }

  var input = document.getElementById('id_serial');
  if (!input) return;

  var form = document.getElementById('form-pre-recebimento');
  if (!form) return;

  input.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    e.preventDefault();

    var serial = (input.value || '').trim();
    if (!serial) return;

    var hidden = form.querySelector('input[name="add_serial"]');
    if (!hidden) {
      hidden = document.createElement('input');
      hidden.type = 'hidden';
      hidden.name = 'add_serial';
      form.appendChild(hidden);
    }
    hidden.value = '1';
    form.noValidate = true;
    form.submit();
  });
})();
</script>

{% endblock %}
