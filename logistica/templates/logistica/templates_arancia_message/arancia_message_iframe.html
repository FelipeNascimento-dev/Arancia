{% extends 'global/base.html' %}

{% block content %}

<style>
.forma:has(.arancia-message-iframe-page) {
    justify-content: flex-start;
    align-items: stretch;
    overflow: hidden;
}

.forma:has(.arancia-message-iframe-page) > .container {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
}

.arancia-message-iframe-page {
    --arancia-top-offset: 50px;
    --arancia-sidebar-width: 70px;

    position: fixed;
    top: var(--arancia-top-offset);
    left: var(--arancia-sidebar-width);
    right: 0;
    bottom: 0;
    z-index: 1;
    background: #fff;
    transition: left 0.3s ease;
    display: flex;
    flex-direction: column;
}

.sidebar:not(.colapsada) ~ .forma .arancia-message-iframe-page {
    --arancia-sidebar-width: 270px;
}

.arancia-message-iframe-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid #e8ebf0;
    background: #fff;
    flex-shrink: 0;
    flex-wrap: wrap;
}

.arancia-message-iframe-hint {
    margin: 0;
    font-size: 12px;
    line-height: 1.5;
    color: #7a5b00;
    background: #fff8e6;
    border: 1px solid #f0d48a;
    border-radius: 8px;
    padding: 8px 12px;
    max-width: min(720px, 100%);
}

.arancia-message-toolbar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
}

.arancia-message-open-link,
.arancia-message-copy-link {
    text-decoration: none;
    background: #222;
    color: #fff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    white-space: nowrap;
    border: none;
    cursor: pointer;
    font-family: inherit;
}

.arancia-message-copy-link {
    background: #fff;
    color: #222;
    border: 1px solid #d1d5db;
}

.arancia-message-open-link:hover {
    background: #444;
    color: #fff;
}

.arancia-message-copy-link:hover {
    background: #f8fafc;
}

.arancia-message-iframe-body {
    flex: 1;
    min-height: 0;
}

.arancia-message-iframe-body iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

.arancia-message-iframe-error {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 32px;
    box-sizing: border-box;
    text-align: center;
    color: #2c3e50;
}

.arancia-message-iframe-error h2 {
    margin: 0 0 12px;
    font-size: 22px;
}

.arancia-message-iframe-error p {
    margin: 0;
    max-width: 560px;
    line-height: 1.6;
    color: #5f6b7a;
}
</style>

<div class="arancia-message-iframe-page">
    {% if arancia_message_url %}
        <div class="arancia-message-iframe-body">
            <iframe
                src="{{ arancia_message_url }}"
                title="Arancia Message"
                frameborder="0"
                allowfullscreen
                loading="lazy">
            </iframe>
        </div>
    {% else %}
        <div class="arancia-message-iframe-error">
            <div>
                <h2>Não foi possível abrir o Arancia Message</h2>
                <p>{{ arancia_message_error|default:"Erro desconhecido ao autenticar." }}</p>
            </div>
        </div>
    {% endif %}
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const btn = document.getElementById('copyAranciaMessageUrl');
    if (!btn) return;

    btn.addEventListener('click', async function () {
        const url = btn.dataset.url || '';
        if (!url) return;

        try {
            await navigator.clipboard.writeText(url);
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Copiado';
            setTimeout(function () { btn.innerHTML = original; }, 1800);
        } catch (err) {
            window.prompt('Copie a URL:', url);
        }
    });
});
</script>

{% endblock %}
