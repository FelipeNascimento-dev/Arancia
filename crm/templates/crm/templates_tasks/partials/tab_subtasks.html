<table class="crm-subtask-table">
    <thead><tr><th>Título</th><th>Status</th></tr></thead>
    <tbody>
        {% for s in subtasks %}
        <tr>
            <td>{{ s.display_title|default:"-" }}</td>
            <td><span class="crm-subtask-status">{{ s.display_status|default:"-" }}</span></td>
        </tr>
        {% empty %}
        <tr><td colspan="2" class="muted">Nenhuma subtarefa.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% if perms.crm.add_task %}
<form method="post" class="crm-inline-form">
    {% csrf_token %}
    <input type="hidden" name="add_subtask" value="1">
    <div class="form-group">{{ subtask_form.title.label_tag }}{{ subtask_form.title }}</div>
    <button type="submit" class="btn btn-primary btn-sm">+ Adicionar</button>
</form>
{% endif %}
