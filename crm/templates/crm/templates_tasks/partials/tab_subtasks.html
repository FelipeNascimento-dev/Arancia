<div class="tab-card">
    <table class="user-table">
        <thead><tr><th>Título</th><th>Status</th></tr></thead>
        <tbody>
            {% for s in subtasks %}
            <tr>
                <td>{{ s.display_title|default:"-" }}</td>
                <td>{{ s.display_status|default:"-" }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="2" class="muted">Nenhuma subtarefa.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    {% if perms.crm.add_task %}
    <form method="post" style="margin-top:12px;">
        {% csrf_token %}
        <input type="hidden" name="add_subtask" value="1">
        {{ subtask_form.title.label_tag }}{{ subtask_form.title }}
        <button type="submit" class="btn btn-primary btn-sm">Adicionar</button>
    </form>
    {% endif %}
</div>
