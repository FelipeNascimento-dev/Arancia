<ul class="crm-attachment-list">
    {% for a in attachments %}
    <li>
        <i class="fa-solid fa-file"></i>
        <a href="{{ a.display_url|default:'#' }}" target="_blank" rel="noopener">{{ a.display_name|default:"Anexo" }}</a>
    </li>
    {% empty %}
    <li class="muted">Nenhum anexo.</li>
    {% endfor %}
</ul>
{% if can_comment %}
<form method="post" enctype="multipart/form-data" class="crm-inline-form">
    {% csrf_token %}
    <input type="hidden" name="upload_attachment" value="1">
    <input type="file" name="attachment" class="form-control">
    <button type="submit" class="btn btn-primary btn-sm">Enviar</button>
</form>
{% endif %}
