<div class="tab-card">
    <table class="user-table">
        <thead><tr><th>Data</th><th>De</th><th>Para</th><th>Usuário</th></tr></thead>
        <tbody>
            {% for h in move_history %}
            <tr>
                <td>{{ h.display_moved_at|default:"-" }}</td>
                <td>{{ h.display_from_status|default:"-" }}</td>
                <td>{{ h.display_to_status|default:"-" }}</td>
                <td>{{ h.display_user|default:"-" }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="muted">Sem histórico de movimentação.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
