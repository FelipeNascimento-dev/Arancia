{% for c in comments %}
<div class="crm-comment-item">
    <strong>{{ c.display_author|default:"Usuário" }}</strong>
    <p>{{ c.display_body|default:"" }}</p>
</div>
{% empty %}
<p class="muted">Nenhum comentário.</p>
{% endfor %}
{% if can_comment %}
<form method="post" style="margin-top:16px;">
    {% csrf_token %}
    <input type="hidden" name="add_comment" value="1">
    <div class="form-group">{{ comment_form.body.label_tag }}{{ comment_form.body }}</div>
    <button type="submit" class="btn btn-primary btn-sm">Comentar</button>
</form>
{% endif %}
