<style>
    .filter-form { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .filter-form select, .filter-form input[type="text"], .filter-form input[type="date"] {
        padding: 8px 10px; border-radius: 8px; border: 1px solid #d9e2ec;
    }
    .search-box input { min-width: 220px; }
</style>
<form method="get" class="filter-form">
    <div class="search-box">
        <input type="text" name="q" placeholder="Pesquisar..." value="{{ filters.q|default:'' }}">
    </div>
    <select name="status_id">
        <option value="">Status</option>
        {% for s in lookups.status_tasks %}
        <option value="{{ s.id }}" {% if filters.status_id == s.id|stringformat:"s" %}selected{% endif %}>{{ s.name }}</option>
        {% endfor %}
    </select>
    <select name="board_id">
        <option value="">Board</option>
        {% for b in lookups.boards %}
        <option value="{{ b.id }}" {% if filters.board_id == b.id|stringformat:"s" %}selected{% endif %}>{{ b.name }}</option>
        {% endfor %}
    </select>
    <select name="priority_id">
        <option value="">Prioridade</option>
        {% for p in lookups.priorities %}
        <option value="{{ p.id }}" {% if filters.priority_id == p.id|stringformat:"s" %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
    </select>
    <select name="project_id">
        <option value="">Projeto</option>
        {% for proj in lookups.projects %}
        <option value="{{ proj.id }}" {% if filters.project_id == proj.id|stringformat:"s" %}selected{% endif %}>{{ proj.display_name }}</option>
        {% endfor %}
    </select>
    <label><input type="checkbox" name="overdue_only" value="true" {% if filters.overdue_only %}checked{% endif %}> Atrasadas</label>
    {% if show_scheduled_filter %}
    <label><input type="checkbox" name="scheduled_only" value="true" {% if filters.scheduled_only %}checked{% endif %}> Agendadas</label>
    {% endif %}
    {% if show_date_range %}
    <input type="date" name="start_at_from" value="{{ filters.start_at_from|default:'' }}" title="Início a partir de">
    <input type="date" name="start_at_to" value="{{ filters.start_at_to|default:'' }}" title="Início até">
    {% endif %}
    <button type="submit" class="btn btn-primary btn-sm">Filtrar</button>
</form>
