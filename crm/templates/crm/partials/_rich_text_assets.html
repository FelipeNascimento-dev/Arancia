<script src="https://cdn.ckeditor.com/ckeditor5/41.4.2/classic/ckeditor.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
<script>
    window.crmRichTextEditor = null;

    function sanitizeCrmRichHtml(html) {
        return DOMPurify.sanitize(html || '', {
            ALLOWED_TAGS: [
                'p', 'br', 'strong', 'b', 'em', 'i', 'u', 's',
                'h1', 'h2', 'h3', 'h4',
                'ul', 'ol', 'li',
                'a', 'blockquote',
                'table', 'thead', 'tbody', 'tr', 'th', 'td'
            ],
            ALLOWED_ATTR: [
                'href', 'target', 'rel', 'colspan', 'rowspan'
            ]
        });
    }

    document.addEventListener('DOMContentLoaded', function () {
        var textarea = document.getElementById('{{ editor_id|default:"taskDescription" }}');
        if (!textarea) {
            return;
        }

        ClassicEditor
            .create(textarea, {
                toolbar: [
                    'heading',
                    '|',
                    'bold',
                    'italic',
                    'link',
                    'bulletedList',
                    'numberedList',
                    '|',
                    'blockQuote',
                    'insertTable',
                    '|',
                    'undo',
                    'redo'
                ]
            })
            .then(function (editor) {
                window.crmRichTextEditor = editor;
            })
            .catch(function (error) {
                console.error('Erro ao iniciar editor de descrição:', error);
            });

        var form = textarea.closest('form');
        if (form) {
            form.addEventListener('submit', function () {
                if (window.crmRichTextEditor) {
                    textarea.value = window.crmRichTextEditor.getData();
                }
            });
        }
    });
</script>
