{% if html %}
{{ html|json_script:script_id }}
<div class="crm-rich-content" id="{{ element_id }}"></div>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
<script>
(function () {
    var scriptEl = document.getElementById('{{ script_id }}');
    var targetEl = document.getElementById('{{ element_id }}');
    if (!scriptEl || !targetEl) {
        return;
    }
    var raw = JSON.parse(scriptEl.textContent);
    targetEl.innerHTML = DOMPurify.sanitize(raw || '', {
        ALLOWED_TAGS: [
            'p', 'br', 'strong', 'b', 'em', 'i', 'u', 's',
            'h1', 'h2', 'h3', 'h4',
            'ul', 'ol', 'li',
            'a', 'blockquote',
            'table', 'thead', 'tbody', 'tr', 'th', 'td'
        ],
        ALLOWED_ATTR: [
            'href', 'target', 'rel', 'colspan', 'rowspan'
        ]
    });
})();
</script>
{% else %}
—
{% endif %}
