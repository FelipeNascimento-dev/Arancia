<script>
document.querySelectorAll('.js-delete').forEach(function(btn) {
    btn.addEventListener('click', function() {
        if (!confirm('Excluir este registro?')) return;
        var id = btn.getAttribute('data-id');
        var resource = btn.getAttribute('data-resource');
        var url = '{% url "crm:ajax_settings_delete" resource="RESOURCE" record_id="00000000-0000-0000-0000-000000000000" %}'
            .replace('RESOURCE', resource)
            .replace('00000000-0000-0000-0000-000000000000', id);
        var fd = new FormData();
        fd.append('csrfmiddlewaretoken', '{{ csrf_token }}');
        fetch(url, { method: 'POST', body: fd, credentials: 'same-origin' })
            .then(function(r) { return r.json(); })
            .then(function(data) { if (data.ok) location.reload(); else alert(data.error); })
            .catch(function() { alert('Erro de rede.'); });
    });
});
</script>
