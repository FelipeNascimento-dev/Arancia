{% extends 'global/base.html' %}

{% block content %}

<style>
    .form-card-2col {
        height: auto;
        margin-top: 65px;
    }

    .extra-info-container {
        margin-top: 25px;
        padding: 18px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #f8fafc;
    }

    .extra-info-title {
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 12px;
    }

    .extra-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 10px;
        margin-bottom: 8px;
    }

    .extra-row input {
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 5px;
    }

    .btn-add-extra {
        margin-top: 8px;
        padding: 6px 12px;
        background: #2563eb;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-add-extra:hover {
        background: #1d4ed8;
    }

    .btn-remove-extra {
        background: #ef4444;
        border: none;
        color: white;
        border-radius: 5px;
        padding: 6px 10px;
        cursor: pointer;
    }

    .btn-remove-extra:hover {
        background: #dc2626;
    }
</style>

<div class="form-container">
    <div class="form-card-2col">
        <form method="POST">
            {% include 'global/partials/_form_2colV2.html' %}
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const clientSelect = document.getElementById("id_cliente");
    const typeSelect = document.getElementById("id_tipo_os");

    function setOrDelete(params, key, value) {
        if (value && value !== "") params.set(key, value);
        else params.delete(key);
    }

    function reloadWithParams() {

        const params = new URLSearchParams(window.location.search);

        if (clientSelect) setOrDelete(params, "cliente", clientSelect.value);
        if (typeSelect) setOrDelete(params, "tipo_os", typeSelect.value);

        window.location.search = params.toString();
    }

    if (clientSelect) {
        clientSelect.addEventListener("change", reloadWithParams);
    }

    if (typeSelect) {
        typeSelect.addEventListener("change", reloadWithParams);
    }

});

document.addEventListener("DOMContentLoaded", function () {

    const container = document.getElementById("extra-fields");
    const addButton = document.getElementById("add-extra");

    addButton.addEventListener("click", function () {

        const row = document.createElement("div");
        row.classList.add("extra-row");

        row.innerHTML = `
            <input type="text" name="extra_key[]" placeholder="Chave" class="form-control">
            <input type="text" name="extra_value[]" placeholder="Valor" class="form-control">
            <button type="button" class="btn btn-danger remove-row">X</button>
        `;

        container.appendChild(row);

    });

    document.addEventListener("click", function (e) {
        if (e.target.classList.contains("remove-row")) {
            e.target.parentElement.remove();
        }
    });

});
</script>

{% endblock %}
