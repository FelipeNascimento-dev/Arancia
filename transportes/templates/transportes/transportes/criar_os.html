{% extends 'global/base.html' %}

{% block content %}

<style>
    .form-card-2col {
        height: auto;
        margin-top: 65px;
    }

    .extra-info-container {
        margin-top: 25px;
        padding: 18px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #f8fafc;
    }

    .extra-info-title {
        font-weight: 600;
        font-size: 15px;
        margin-bottom: 12px;
    }

    .extra-row {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 10px;
        margin-bottom: 8px;
    }

    .extra-row input {
        padding: 8px;
        border: 1px solid #d1d5db;
        border-radius: 5px;
    }

    .btn-add-extra {
        margin-top: 8px;
        padding: 6px 12px;
        background: #2563eb;
        border: none;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    .btn-add-extra:hover {
        background: #1d4ed8;
    }

    .btn-remove-extra {
        background: #ef4444;
        border: none;
        color: white;
        border-radius: 5px;
        padding: 6px 10px;
        cursor: pointer;
    }

    .btn-remove-extra:hover {
        background: #dc2626;
    }

    .autocomplete-wrapper {
        position: relative;
        width: 100%;
    }

    .autocomplete-hidden-select {
        position: absolute !important;
        opacity: 0 !important;
        pointer-events: none !important;
        height: 0 !important;
        width: 0 !important;
        margin: 0 !important;
        padding: 0 !important;
        border: 0 !important;
        overflow: hidden !important;
    }

    .autocomplete-input {
        width: 100%;
    }

    .search-dropdown {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        width: 100%;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        max-height: 220px;
        overflow-y: auto;
        z-index: 9999;
        box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        display: none;
    }

    .search-item {
        padding: 10px 12px;
        cursor: pointer;
        font-size: 14px;
        line-height: 1.3;
    }

    .search-item:hover {
        background: #2563eb;
        color: #fff;
    }
</style>

<div class="form-container">
    <div class="form-card-2col">
        <form method="POST">
            {% include 'global/partials/_form_2colV2.html' %}
        </form>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    function makeSearchable(selectId) {
        const select = document.getElementById(selectId);
        if (!select) return;

        const parent = select.parentNode;

        const wrapper = document.createElement("div");
        wrapper.className = "autocomplete-wrapper";

        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Digite pelo menos 2 letras...";
        input.className = "form-control autocomplete-input";

        const dropdown = document.createElement("div");
        dropdown.className = "search-dropdown";

        parent.insertBefore(wrapper, select);
        wrapper.appendChild(input);
        wrapper.appendChild(dropdown);
        wrapper.appendChild(select);

        select.classList.add("autocomplete-hidden-select");

        let debounceTimer = null;

        input.addEventListener("input", function () {
            const query = this.value.trim();

            if (query.length < 2) {
                dropdown.style.display = "none";
                dropdown.innerHTML = "";
                select.innerHTML = "";
                return;
            }

            clearTimeout(debounceTimer);

            debounceTimer = setTimeout(async () => {
                try {
                    const response = await fetch(
                        "{% url 'transportes:buscar_locais' %}?q=" + encodeURIComponent(query)
                    );

                    const data = await response.json();

                    dropdown.innerHTML = "";

                    if (!data.items || data.items.length === 0) {
                        dropdown.style.display = "none";
                        return;
                    }

                    data.items.forEach(opt => {
                        const item = document.createElement("div");
                        item.className = "search-item";
                        item.textContent = opt.label;

                        item.addEventListener("click", function () {
                            input.value = opt.label;

                            select.innerHTML = "";
                            const option = new Option(opt.label, opt.id, true, true);
                            select.appendChild(option);
                            select.value = opt.id;

                            dropdown.style.display = "none";
                        });

                        dropdown.appendChild(item);
                    });

                    dropdown.style.display = "block";
                } catch (error) {
                    console.error("Erro no autocomplete:", error);
                    dropdown.style.display = "none";
                }
            }, 300);
        });

        document.addEventListener("click", function (e) {
            if (!wrapper.contains(e.target)) {
                dropdown.style.display = "none";
            }
        });
    }

    makeSearchable("id_origem");
    makeSearchable("id_destino");

    const clientSelect = document.getElementById("id_cliente");
    const typeSelect = document.getElementById("id_tipo_os");

    function setOrDelete(params, key, value) {
        if (value && value !== "") params.set(key, value);
        else params.delete(key);
    }

    function reloadWithParams() {
        const params = new URLSearchParams(window.location.search);

        if (clientSelect) setOrDelete(params, "cliente", clientSelect.value);
        if (typeSelect) setOrDelete(params, "tipo_os", typeSelect.value);

        window.location.search = params.toString();
    }

    if (clientSelect) {
        clientSelect.addEventListener("change", reloadWithParams);
    }

    if (typeSelect) {
        typeSelect.addEventListener("change", reloadWithParams);
    }

    const container = document.getElementById("extra-fields");
    const addButton = document.getElementById("add-extra");

    if (addButton && container) {
        addButton.addEventListener("click", function () {
            const row = document.createElement("div");
            row.classList.add("extra-row");

            row.innerHTML = `
                <input type="text" name="extra_key[]" placeholder="Chave" class="form-control">
                <input type="text" name="extra_value[]" placeholder="Valor" class="form-control">
                <button type="button" class="btn-remove-extra remove-row">✕</button>
            `;

            container.appendChild(row);
        });
    }

    document.addEventListener("click", function (e) {
        if (e.target.classList.contains("remove-row")) {
            e.target.parentElement.remove();
        }
    });

});
</script>

{% endblock %}
