{% extends 'global/base.html' %}
{% block content %}
<style>
    .form-card-2col { height: auto; margin-top: 65px; }
</style>

<div class="form-container">
    <div class="form-card-2col">
        <form method="POST">
            <input type="hidden" name="edit_project" value="1">
            <h2>{{ form.nome_formulario }}</h2>
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="form-grid-2col">
                {% for campo in form %}
                <div class="form-group">
                    {{ campo.label_tag }}
                    {{ campo }}
                    {% if campo.errors %}<div class="error">{{ campo.errors }}</div>{% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="{% url 'projetos:detalhe_projeto' project_id %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<div style="margin: 20px 90px;">
    <a href="{% url 'projetos:detalhe_projeto' project_id %}" class="btn btn-secondary"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
</div>
{% endblock %}
